site_name: Temperature, Pressure and Effective Thermal Conductivity Recorder Manual
site_url: https://Kiki-Schreibt.github.io/t_p_etc_recorder_v2/


theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
            options:
              show_source: true
              show_root_heading: true
              show_submodules: false
            paths:
              - src
  - gen-files:
      scripts:
        - docs/gen_api_v2.py
  - awesome-pages


nav:
  - index.md
  - User Manual:
      - Overview: user_manual/overview.md
      - Installation: user_manual/installation.md
      - Configuration Creation: user_manual/config_creation.md
      - Main_Window: user_manual/general.md
      - Create_New_Test: user_manual/create_new_test.md
  - API: api/index.md
